version: '3.7'

services:
  watchtower:
    container_name: watchtower
    build:
      context: ./
      dockerfile: dockerfiles/Dockerfile.dev-self-contained
    volumes:
      # Mount Docker socket (required for container operations)
      - /var/run/docker.sock:/var/run/docker.sock
    # Security enhancements
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Network isolation
    networks:
      - watchtower-net
    # Health check
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security environment variables
    environment:
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_LOG_LEVEL=info
      # Restrict watchtower to specific containers
      - WATCHTOWER_SCOPE=watchtower-scope
    # Add labels to this container so it doesn't monitor itself
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    command: --interval 10 --debug parent child

  parent:
    image: nginx
    container_name: parent
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "watchtower-scope"

  child:
    image: nginx:alpine
    labels:
      com.centurylinklabs.watchtower.depends-on: parent
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "watchtower-scope"
    container_name: child

networks:
  watchtower-net:
    driver: bridge
